name: Auto-merge Dependabot Pull Requests

on:
  pull_request:
    branches:
      - main

jobs:
  auto_merge:
    name: Auto-merge Dependabot PRs
    permissions:
      contents: write
      pull-requests: write
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Fetch Dependabot Metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Determine auto-merge eligibility
        id: check-eligibility
        run: |
          echo "eligible=$(if [[ '${{ steps.dependabot-metadata.outputs.update-type }}' != 'version-update:semver-major' ]]; then echo 'true'; else echo 'false'; fi)" >> $GITHUB_OUTPUT

      - name: Approve Pull Request
        if: steps.check-eligibility.outputs.eligible == 'true'
        run: gh pr review --approve ${{ github.event.pull_request.html_url }}

      - name: Merge Pull Request
        if: steps.check-eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash ${{ github.event.pull_request.html_url }}
