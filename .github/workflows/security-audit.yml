name: Security Audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  zizmor:
    name: Zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - run: pip install semgrep
      - run: semgrep ci --config=p/default --config=p/github-actions

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  combine-audit:
    needs:
      - actionlint
      - zizmor
      - semgrep
      - gitleaks
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: Verify upstream
        run: |
          actionlint_result='${{ needs.actionlint.result }}'
          zizmor_result='${{ needs.zizmor.result }}'
          semgrep_result='${{ needs.semgrep.result }}'
          gitleaks_result='${{ needs.gitleaks.result }}'
          for result in "$actionlint_result" "$zizmor_result" "$semgrep_result" "$gitleaks_result"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Audit failed: actionlint=$actionlint_result zizmor=$zizmor_result semgrep=$semgrep_result gitleaks=$gitleaks_result"
              exit 1
            fi
          done
          echo "All audits passed"
