---
layout: default
---
<main{% if page.main_id %} id="{{ page.main_id }}"{% endif %}>
    <ul class="nav">
        {% for item in page.items %}
        <li>
            <a class="button" href="{{ item.href }}">{{ item.label }}</a>
        </li>
        {% endfor %}
        <li>
            {% include back.html href=page.back %}
        </li>
    </ul>
</main>
